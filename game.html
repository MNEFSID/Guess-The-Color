<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess The Color - Game</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Fredoka One', sans-serif;
  background: linear-gradient(135deg,#111,#333);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  min-height:100vh;
  margin:0;
  padding:20px;
  color:#fff;
}

h1 {
  font-family:'Press Start 2P',cursive;
  font-size:32px;
  text-align:center;
  margin-bottom:20px;
  line-height:1.2;
}

h1 span {
  display:inline-block;
  animation: rainbowText 2s linear infinite;
  font-weight:bold;
}

@keyframes rainbowText {
  0%{color:#ff4d4d;}
  14%{color:#ffb84d;}
  28%{color:#ffff4d;}
  42%{color:#4dff4d;}
  57%{color:#4dffff;}
  71%{color:#4d4dff;}
  85%{color:#b84dff;}
  100%{color:#ff4d4d;}
}

#timer {
  font-size:28px;
  font-weight:bold;
  margin-bottom:20px;
  padding:10px 20px;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  box-shadow:0 4px 15px rgba(255,255,255,0.2);
  text-align:center;
}

#colorBox {
  width:220px;
  height:220px;
  border-radius:15px;
  border:3px solid #fff;
  position:relative;
  overflow:hidden;
  margin-bottom:20px;
  background:#000;
  box-shadow:0 0 40px rgba(255,255,255,0.2);
  transition: background 0.3s, box-shadow 0.3s;
}

.sliderContainer {
  margin:10px 0;
  display:flex;
  flex-direction:column;
  width:260px;
}

input[type="range"] {
  width:100%;
  -webkit-appearance:none;
  height:10px;
  border-radius:5px;
  background:linear-gradient(to right,#28a745,#85e085);
  outline:none;
  transition:0.2s;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance:none;
  appearance:none;
  width:20px;
  height:20px;
  background:#fff;
  border:2px solid #28a745;
  border-radius:50%;
  cursor:pointer;
  box-shadow:0 2px #1e7e34;
  transition:0.2s;
}

input[type="range"]::-webkit-slider-thumb:active {
  transform:scale(1.2);
}

button {
  padding:12px 25px;
  margin-top:15px;
  font-family:'Fredoka One',sans-serif;
  font-size:16px;
  font-weight:bold;
  border-radius:10px;
  border:none;
  cursor:pointer;
  transition:all 0.1s ease-in-out;
  box-shadow:0 5px rgba(0,0,0,0.2);
}

#submitBtn {
  background:linear-gradient(45deg,#28a745,#85e085);
  color:#fff;
  text-shadow:1px 1px #1e7e34;
  box-shadow:0 6px #1e7e34,0 0 15px rgba(40,167,69,0.5);
}

#restartBtn {
  background:linear-gradient(45deg,#007bff,#6ec0ff);
  color:#fff;
  text-shadow:1px 1px #004085;
  box-shadow:0 6px #004085,0 0 15px rgba(0,123,255,0.5);
}

#result {
  margin-top:25px;
  font-size:18px;
  font-weight:bold;
  text-align:center;
}

#leaderboard {
  margin-top:30px;
  width:300px;
  background: rgba(255,255,255,0.05);
  border-radius:15px;
  padding:20px;
  box-shadow:0 0 20px rgba(255,255,255,0.1);
}

#leaderboard h2 {
  text-align:center;
  margin-bottom:15px;
  font-size:20px;
}

#leaderboard ul {
  list-style:none;
  padding:0;
  margin:0;
}

#leaderboard li {
  padding:5px 0;
  border-bottom:1px solid rgba(255,255,255,0.2);
}
</style>
</head>
<body>

<h1>
  Guess The<br>
  <span>Color</span>
</h1>

<div id="timer">5</div>
<div id="colorBox"></div>

<div id="sliders" style="display:none;">
  <div class="sliderContainer">
    <label>Hue: <span id="hueVal">0</span></label>
    <input type="range" id="hue" min="0" max="360" value="0">
  </div>
  <div class="sliderContainer">
    <label>Saturation: <span id="satVal">100</span>%</label>
    <input type="range" id="sat" min="0" max="100" value="100">
  </div>
  <div class="sliderContainer">
    <label>Brightness: <span id="briVal">50</span>%</label>
    <input type="range" id="bri" min="0" max="100" value="50">
  </div>
  <button id="submitBtn">Submit Guess</button>
  <button id="restartBtn">Restart</button>
</div>

<div id="result"></div>

<div id="leaderboard">
  <h2>Leaderboard</h2>
  <ul id="leaderboardList"></ul>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-auth.js";
import { getDatabase, ref, set, update, get, child, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyARXV3oAQEw6dbXkfdZcTB5F7KCsWI1JyQ",
  authDomain: "guessthecolor-ac681.firebaseapp.com",
  databaseURL: "https://guessthecolor-ac681-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "guessthecolor-ac681",
  storageBucket: "guessthecolor-ac681.appspot.com",
  messagingSenderId: "210385013231",
  appId: "1:210385013231:web:8a121ff0c3e390eef4ce1a",
  measurementId: "G-QGYMCVKTJB"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();

let color = {h:0,s:100,l:50};
let timer = 5;
let interval;

const colorBox = document.getElementById('colorBox');
const timerEl = document.getElementById('timer');
const sliders = document.getElementById('sliders');
const result = document.getElementById('result');
const leaderboardList = document.getElementById('leaderboardList');

function randomColor() {
  color.h = Math.floor(Math.random()*361);
  color.s = Math.floor(Math.random()*101);
  color.l = Math.floor(Math.random()*101);
  colorBox.style.background = `hsl(${color.h}, ${color.s}%, ${color.l}%)`;
  colorBox.style.boxShadow = `0 0 40px hsl(${color.h}, ${color.s}%, ${color.l}%)`;
}

function startTimer() {
  timer = 5;
  timerEl.textContent = timer;
  interval = setInterval(()=>{
    timer--;
    timerEl.textContent = timer;
    if(timer<=0){
      clearInterval(interval);
      colorBox.style.background = '#111';
      colorBox.style.boxShadow = `0 0 40px #000`;
      sliders.style.display = 'block';
    }
  },1000);
}

['hue','sat','bri'].forEach(id=>{
  const slider = document.getElementById(id);
  const label = document.getElementById(id+'Val');
  slider.addEventListener('input', ()=>{
    label.textContent = slider.value;
    const h = parseInt(document.getElementById('hue').value);
    const s = parseInt(document.getElementById('sat').value);
    const l = parseInt(document.getElementById('bri').value);
    colorBox.style.background = `hsl(${h}, ${s}%, ${l}%)`;
    colorBox.style.boxShadow = `0 0 40px hsl(${h}, ${s}%, ${l}%)`;
  });
});

function calcAccuracy(guess, actual){
  const diffH = Math.min(Math.abs(guess.h - actual.h), 360 - Math.abs(guess.h - actual.h))/360;
  const diffS = Math.abs(guess.s - actual.s)/100;
  const diffL = Math.abs(guess.l - actual.l)/100;
  const score = (1-(diffH+diffS+diffL)/3)*100;
  return score.toFixed(1);
}

// Submit guess & update Firebase
document.getElementById('submitBtn').addEventListener('click', async ()=>{
  const guess = {
    h: parseInt(document.getElementById('hue').value),
    s: parseInt(document.getElementById('sat').value),
    l: parseInt(document.getElementById('bri').value)
  };
  const accuracy = parseFloat(calcAccuracy(guess,color));
  let colorAcc;
  if(accuracy<40) colorAcc='red';
  else if(accuracy<70) colorAcc='yellow';
  else colorAcc='limegreen';

  result.innerHTML = `Accuracy: <span style="color:${colorAcc}">${accuracy}%</span>`;
  colorBox.style.background = `hsl(${color.h}, ${color.s}%, ${color.l}%)`;
  colorBox.style.boxShadow = `0 0 40px hsl(${color.h}, ${color.s}%, ${color.l}%)`;

  const user = auth.currentUser;
  if(user){
    const userRef = ref(db,'users/'+user.uid);
    const snapshot = await get(userRef);
    if(snapshot.exists()){
      const data = snapshot.val();
      const newAccuracy = Math.max(accuracy, data.accuracy||0);
      await update(userRef,{accuracy:newAccuracy});
      updateLeaderboard();
    }
  }
});

document.getElementById('restartBtn').addEventListener('click', ()=>{
  clearInterval(interval);
  result.innerHTML='';
  sliders.style.display='none';
  document.getElementById('hue').value=0;
  document.getElementById('sat').value=100;
  document.getElementById('bri').value=50;
  document.getElementById('hueVal').textContent=0;
  document.getElementById('satVal').textContent=100;
  document.getElementById('briVal').textContent=50;
  randomColor();
  startTimer();
});

// Leaderboard
async function updateLeaderboard(){
  const snapshot = await get(ref(db,'users'));
  if(snapshot.exists()){
    const data = snapshot.val();
    const usersArray = Object.values(data).filter(u => u.accuracy !== undefined);
    usersArray.sort((a,b)=>b.accuracy - a.accuracy); // descending
    leaderboardList.innerHTML='';
    usersArray.slice(0,10).forEach(u=>{
      const li = document.createElement('li');
      li.textContent = `${u.name || 'Anonymous'} - ${u.accuracy}%`;
      leaderboardList.appendChild(li);
    });
  }
  }

// Cek login user
onAuthStateChanged(auth,user=>{
  if(user){
    updateLeaderboard();
  }else{
    window.location.href='index.html';
  }
});

randomColor();
startTimer();
</script>

</body>
</html>
